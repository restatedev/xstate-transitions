packages:
  - "packages/*"

allowBuilds:
  cpu-features: false
  esbuild: false
  protobufjs: false
  ssh2: false

# Shared dependency versions referenced as `catalog:` in each package.
# xstate is pinned exactly: the integration depends on xstate internals.
catalog:
  "@restatedev/restate-sdk": ^1.16.2
  "@restatedev/restate-sdk-clients": 1.16.2
  "@restatedev/restate-sdk-testcontainers": 1.16.2
  xstate: 6.0.0-alpha.21

minimumReleaseAgeExclude:
  - "@publint/pack@0.1.6"
  - publint@0.3.22
