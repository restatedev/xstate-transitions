packages:
  - "packages/*"

allowBuilds:
  cpu-features: false
  esbuild: false
  protobufjs: false
  ssh2: false

# Shared dependency versions referenced as `catalog:` in each package.
# The lockfile records the currently tested XState release; the peer range lets
# consumers adopt compatible v6 updates without waiting for a package release.
catalog:
  "@restatedev/restate-sdk": ^1.16.2
  "@restatedev/restate-sdk-clients": 1.16.2
  "@restatedev/restate-sdk-testcontainers": 1.16.2
  xstate: 6.0.0-alpha.22

minimumReleaseAgeExclude:
  - "@publint/pack@0.1.6"
  - publint@0.3.22
  - xstate@6.0.0-alpha.22
